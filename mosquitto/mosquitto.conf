# Standalone Mosquitto config for chicagooffline.com production
# Split from CoreScope container for independent lifecycle

# Listen on all interfaces, plain TCP
listener 1883 0.0.0.0

# Allow anonymous connections (no auth for now)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# Limits
max_queued_messages 1000
message_size_limit 0
