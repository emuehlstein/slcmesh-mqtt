name: Deploy Salt Lake Offline

on:
  push:
    branches: [main, slc-prod]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: ''
        type: choice
        options: ['', 'production', 'dev']
      reset_db:
        description: 'Wipe CoreScope database'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ (github.event.inputs.environment != '' && github.event.inputs.environment) || (github.ref == 'refs/heads/slc-prod' && 'production') || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/slc-prod" ]; then
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

          if [ "${{ github.ref }}" = "refs/heads/slc-prod" ]; then
            echo "branch=slc-prod" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.dev.yml" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          ENVIRONMENT: ${{ steps.env.outputs.name }}
          COMPOSE_FILE: ${{ steps.env.outputs.compose_file }}
          BRANCH: ${{ steps.env.outputs.branch }}
          BROKER_CORESCOPE_PASSWORD: ${{ secrets.BROKER_CORESCOPE_PASSWORD }}
          BROKER_ADMIN_PASSWORD: ${{ secrets.BROKER_ADMIN_PASSWORD }}
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << ENDSSH
            set -e
            REPO_DIR=\$HOME/slcmesh-mqtt
            
            # Pull latest code
            cd \$REPO_DIR
            git fetch origin
            git reset --hard origin/${BRANCH}
            
            # Pull submodule repos
            for dir in CoreScope-slcoffline meshcore-health-check meshcore-mqtt-live-map; do
              if [ -d "\$dir/.git" ]; then
                git -C \$dir pull --ff-only 2>/dev/null || true
              fi
            done
            
            # Reset DB if requested
            if [ "${RESET_DB}" = "true" ]; then
              echo "Resetting CoreScope database..."
              docker compose -f ${COMPOSE_FILE} stop corescope corescope-dev 2>/dev/null || true
              VOLUME=\$(docker volume ls -q | grep corescope | head -1)
              if [ -n "\$VOLUME" ]; then
                MOUNT=\$(docker volume inspect \$VOLUME --format '{{.Mountpoint}}')
                sudo rm -f \$MOUNT/meshcore.db
                echo "Database wiped"
              fi
            fi
            
            # Build and deploy
            docker compose -f ${COMPOSE_FILE} build
            docker compose -f ${COMPOSE_FILE} up -d
            
            echo "Deploy complete: ${ENVIRONMENT} (${COMPOSE_FILE})"
            docker ps --format "table {{.Names}}\t{{.Status}}"
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
