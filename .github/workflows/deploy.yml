name: Deploy CoreScope

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: ''
        type: choice
        options: ['', 'production', 'dev']
      reset_db:
        description: 'Wipe CoreScope database'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ (github.event.inputs.environment != '' && github.event.inputs.environment) || (github.ref == 'refs/heads/main' && 'production') || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve environment name
        id: env
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi
          
          # Determine which branch to deploy
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "branch=dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          HC_SECRET_B64: ${{ secrets.CARTOGRAPHER_HEALTHCHECK_KEY }}
          ENVIRONMENT: ${{ steps.env.outputs.name }}
          BROKER_CORESCOPE_PASSWORD: ${{ secrets.BROKER_CORESCOPE_PASSWORD }}
          BROKER_ADMIN_PASSWORD: ${{ secrets.BROKER_ADMIN_PASSWORD }}
          DEPLOY_KEY_CONTENT: ${{ secrets.DEPLOY_KEY }}
        run: |
          # Write deploy key to EC2 for git clone (via scp to avoid shell escaping issues)
          if [ -n "$DEPLOY_KEY_CONTENT" ]; then
            printf '%s\n' "$DEPLOY_KEY_CONTENT" > /tmp/chimesh_deploy_key
            chmod 600 /tmp/chimesh_deploy_key
            scp -i ~/.ssh/id_rsa /tmp/chimesh_deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/.ssh/chimesh_deploy
            rm -f /tmp/chimesh_deploy_key
          fi

          ssh -i ~/.ssh/id_rsa \
            -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            HC_SECRET="$HC_SECRET_B64" RESET_DB="${{ github.event.inputs.reset_db }}" ENVIRONMENT="$ENVIRONMENT" BROKER_CORESCOPE_PASSWORD="$BROKER_CORESCOPE_PASSWORD" BROKER_ADMIN_PASSWORD="$BROKER_ADMIN_PASSWORD" bash -s << 'ENDSSH'
            set -e
            REPO_DIR=$HOME/chimesh-mqtt
            BRANCH="${{ steps.env.outputs.branch }}"
            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/chimesh_deploy -o StrictHostKeyChecking=no"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone git@github.com:emuehlstein/chimesh-mqtt.git $REPO_DIR
            else
              git -C $REPO_DIR fetch origin
              git -C $REPO_DIR reset --hard origin/$BRANCH
            fi
            cd $REPO_DIR
            RESET_DB="${RESET_DB:-}" TEST_CHANNEL_SECRET="$HC_SECRET" ENVIRONMENT="${ENVIRONMENT:-production}" BROKER_CORESCOPE_PASSWORD="${BROKER_CORESCOPE_PASSWORD:-}" BROKER_ADMIN_PASSWORD="${BROKER_ADMIN_PASSWORD:-}" bash deploy.sh
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
