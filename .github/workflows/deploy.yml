name: Deploy CoreScope

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            set -e
            REPO_DIR=\$HOME/chimesh-mqtt
            if [ ! -d "\$REPO_DIR/.git" ]; then
              GIT_TERMINAL_PROMPT=0 git clone https://github.com/emuehlstein/chimesh-mqtt.git \$REPO_DIR
            else
              git -C \$REPO_DIR remote set-url origin https://github.com/emuehlstein/chimesh-mqtt.git
              GIT_TERMINAL_PROMPT=0 git -C \$REPO_DIR fetch origin main
              git -C \$REPO_DIR reset --hard origin/main
            fi
            cd \$REPO_DIR
            TEST_CHANNEL_SECRET='${{ secrets.CARTOGRAPHER_HEALTHCHECK_KEY }}' bash deploy.sh
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
