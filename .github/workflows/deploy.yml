name: Deploy CoreScope

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'Wipe CoreScope database (true/false)'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          HC_SECRET_B64: ${{ secrets.CARTOGRAPHER_HEALTHCHECK_KEY }}
        run: |
          # Write deploy key to EC2 temporarily for cloning
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ~/.ssh && echo '${{ secrets.DEPLOY_KEY }}' > ~/.ssh/chimesh_deploy && chmod 600 ~/.ssh/chimesh_deploy"

          # Pass secret safely via env var, decoded on the remote side
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            HC_SECRET="$HC_SECRET_B64" RESET_DB="${{ github.event.inputs.reset_db }}" bash -s << 'ENDSSH'
            set -e
            REPO_DIR=$HOME/chimesh-mqtt
            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/chimesh_deploy -o StrictHostKeyChecking=no"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone git@github.com:emuehlstein/chimesh-mqtt.git $REPO_DIR
            else
              git -C $REPO_DIR fetch origin main
              git -C $REPO_DIR reset --hard origin/main
            fi
            cd $REPO_DIR
            RESET_DB="${RESET_DB:-}" TEST_CHANNEL_SECRET="$HC_SECRET" bash deploy.sh
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
