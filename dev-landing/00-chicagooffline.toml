# Chicago Offline MeshCore MQTT Configuration
# Drop this file into /etc/mctomqtt/config.d/
#
# Includes: letsmesh (US + EU), chimesh.org, chicagooffline.com (prod + dev)
#
# All brokers use JWT token auth -- your device signs with its Ed25519 key.
# No passwords needed. Requires firmware supporting `get prv.key` (v1.8.0+).
#
# NOTE: If your 00-user.toml already has letsmesh-us and letsmesh-eu,
# you can remove those entries to avoid duplicates, or just disable
# the ones in this file by setting enabled = false.
#
# Usage:
#   curl -O https://dev-landing.chicagooffline.com/00-chicagooffline.toml
#   sudo cp 00-chicagooffline.toml /etc/mctomqtt/config.d/
#   sudo systemctl restart mctomqtt   # Linux
#   sudo launchctl unload /Library/LaunchDaemons/com.meshcore.mctomqtt.plist && \
#   sudo launchctl load /Library/LaunchDaemons/com.meshcore.mctomqtt.plist  # macOS

# -- letsmesh.net (US) -----------------------------------------------------
[[broker]]
name = "letsmesh-us"
enabled = true
server = "mqtt-us-v1.letsmesh.net"
port = 443
transport = "websockets"
keepalive = 60
qos = 0
retain = true

[broker.tls]
enabled = true
verify = true

[broker.auth]
method = "token"
audience = "mqtt-us-v1.letsmesh.net"

