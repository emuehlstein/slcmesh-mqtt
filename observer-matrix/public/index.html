<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Observer Status Matrix — Chicago Mesh</title>
<style>
  :root {
    --bg: #0C0F1A;
    --surface: #141829;
    --cyan: #00E5FF;
    --amber: #FFB300;
    --green: #39FF14;
    --red: #ef4444;
    --text: #EDF2FF;
    --muted: #A0AABF;
    --border: #1e2a3a;
    --row-stripe: #111727;
    --row-hover: #1a2540;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--cyan);
    letter-spacing: 0.5px;
  }
  .header h1 span { color: var(--muted); font-weight: 400; }
  .meta {
    display: flex;
    gap: 1rem;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .source-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.2rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.online { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .dot.offline { background: var(--red); box-shadow: 0 0 4px var(--red); }
  .dot.stale { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
  .dot.unseen { background: var(--muted); }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    white-space: nowrap;
  }
  thead th {
    background: var(--bg);
    color: var(--cyan);
    text-align: left;
    padding: 0.6rem 0.8rem;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:nth-child(even) { background: var(--row-stripe); }
  tbody tr:hover { background: var(--row-hover); }
  td {
    padding: 0.5rem 0.8rem;
    vertical-align: middle;
  }
  .name-cell { font-weight: 600; }
  .pubkey { color: var(--muted); font-size: 0.75rem; }
  .model-cell { color: var(--muted); font-size: 0.75rem; }

  /* Env status cell */
  .env-cell {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .env-cell .ago {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .env-cell.online .ago { color: var(--green); }
  .env-cell.stale .ago { color: var(--amber); }

  /* Details row */
  .details-row td {
    padding: 0.3rem 0.8rem 0.6rem 2rem;
    font-size: 0.72rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .details-row .stat-grid {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
  }
  .details-row .stat-grid span { color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 1rem;
  }
  .empty-state .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.8rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-info { font-size: 0.7rem; color: var(--muted); }

  /* Expandable row toggle */
  .expand-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0 0.3rem;
    transition: color 0.15s;
  }
  .expand-btn:hover { color: var(--cyan); }

  @media (max-width: 768px) {
    body { padding: 0.75rem; }
    .header h1 { font-size: 1.1rem; }
    table { font-size: 0.75rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📡 Observer Matrix <span>— Chicago Mesh</span></h1>
  <div class="meta">
    <div id="sources"></div>
    <span class="refresh-info">auto-refresh 30s</span>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th></th>
        <th>Observer</th>
        <th>Key Prefix</th>
        <th>Model</th>
        <th id="env-headers"><!-- filled by JS --></th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="99" class="empty-state"><div class="spinner"></div><br>Connecting to MQTT sources…</td></tr>
    </tbody>
  </table>
</div>

<script>
const POLL_MS = 30000;
let expanded = new Set();

function ago(ms) {
  if (ms == null) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ' + (m % 60) + 'm';
  return Math.floor(h / 24) + 'd';
}

function statusDot(status) {
  return `<span class="dot ${status}"></span>`;
}

async function refresh() {
  try {
    const res = await fetch('/api/observers');
    const data = await res.json();
    renderSources(data.sources);
    renderTable(data.sources, data.observers);
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function renderSources(sources) {
  const el = document.getElementById('sources');
  el.innerHTML = sources.map(s =>
    `<span class="source-badge">${statusDot(s.connected ? 'online' : 'offline')} ${s.label}</span>`
  ).join('');
}

function renderTable(sources, observers) {
  // Update env column headers
  const envTh = document.getElementById('env-headers');
  // Replace single placeholder th with multiple
  const headRow = envTh.parentElement;
  // Remove old env ths
  document.querySelectorAll('.env-th').forEach(e => e.remove());
  envTh.style.display = 'none';
  for (const s of sources) {
    const th = document.createElement('th');
    th.className = 'env-th';
    th.textContent = s.label;
    headRow.appendChild(th);
  }

  const tbody = document.getElementById('tbody');
  if (!observers.length) {
    tbody.innerHTML = '<tr><td colspan="99" class="empty-state">No observers seen yet. Waiting for status heartbeats…</td></tr>';
    return;
  }

  let html = '';
  for (const obs of observers) {
    const isExpanded = expanded.has(obs.pubkey);
    html += `<tr>`;
    html += `<td><button class="expand-btn" data-pk="${obs.pubkey}">${isExpanded ? '▼' : '▶'}</button></td>`;
    html += `<td class="name-cell">${esc(obs.name)}</td>`;
    html += `<td class="pubkey">${esc(obs.pubkeyPrefix)}</td>`;
    html += `<td class="model-cell">${esc(obs.model)}</td>`;
    for (const s of sources) {
      const env = obs.environments[s.name];
      const st = env?.status || 'unseen';
      const agoStr = ago(env?.lastSeenAgo);
      html += `<td><div class="env-cell ${st}">${statusDot(st)} <span class="ago">${agoStr}</span></div></td>`;
    }
    html += `</tr>`;

    if (isExpanded) {
      const cols = 4 + sources.length;
      html += `<tr class="details-row"><td colspan="${cols}">`;
      html += `<div class="stat-grid">`;
      html += `<span>Region:</span> ${esc(obs.region)}`;
      html += ` · <span>Firmware:</span> ${esc(obs.firmware || '—')}`;
      html += ` · <span>Radio:</span> ${esc(obs.radio || '—')}`;
      if (obs.stats) {
        if (obs.stats.battery_mv != null) html += ` · <span>Battery:</span> ${obs.stats.battery_mv}mV`;
        if (obs.stats.uptime_secs != null) html += ` · <span>Uptime:</span> ${ago(obs.stats.uptime_secs * 1000)}`;
        if (obs.stats.noise_floor != null) html += ` · <span>Noise:</span> ${obs.stats.noise_floor}dBm`;
        if (obs.stats.errors != null) html += ` · <span>Errors:</span> ${obs.stats.errors}`;
      }
      html += `</div>`;
      html += `<div style="margin-top:0.3rem; font-size:0.68rem; color:#555">Key: ${esc(obs.pubkey)}</div>`;
      html += `</td></tr>`;
    }
  }
  tbody.innerHTML = html;

  // Bind expand buttons
  tbody.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const pk = btn.dataset.pk;
      if (expanded.has(pk)) expanded.delete(pk);
      else expanded.add(pk);
      renderTable(sources, observers);
    });
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
