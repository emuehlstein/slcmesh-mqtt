# docker-compose.prod.yml — Production stack for slcoffline.com
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f corescope
#   docker compose -f docker-compose.prod.yml down
#
# Secrets: copy .env.example → .env and fill in passwords before first deploy.

x-common: &common
  restart: unless-stopped
  networks: [slcoffline]

services:
  # ── CoreScope (packet analyzer + web UI) ──────────────────────────────────
  corescope:
    <<: *common
    build:
      context: ${CORESCOPE_FORK_DIR:-./CoreScope-slcoffline}
      args:
        APP_VERSION: slcoffline-production
    environment:
      - DISABLE_CADDY=true
      - DISABLE_MOSQUITTO=true
    volumes:
      - corescope-data:/app/data
      - ./config.resolved.json:/app/data/config.json:ro

  # ── Mosquitto (plain TCP MQTT broker) ─────────────────────────────────────
  mosquitto:
    <<: *common
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  # ── meshcore-mqtt-broker (WebSocket MQTT + JWT auth) ──────────────────────
  meshcore-mqtt-broker:
    <<: *common
    build:
      context: ./meshcore-mqtt-broker
    env_file: .env.broker
    volumes:
      - broker-data:/data


  # -- MQTT Bridge (WS broker -> mosquitto) -----------------------------------
  mqtt-bridge:
    <<: *common
    build:
      context: ./mqtt-bridge
    env_file: .env.mqtt-bridge
    depends_on:
      - mosquitto
      - meshcore-mqtt-broker

  # ── Mesh Health Check ─────────────────────────────────────────────────────
  meshcore-health-check:
    <<: *common
    build:
      context: ${HEALTH_CHECK_DIR:-./meshcore-health-check}
    env_file: .env.healthcheck
    volumes:
      - healthcheck-data:/app/data

  # ── Live Map ──────────────────────────────────────────────────────────────
  meshmap-live:
    <<: *common
    build:
      context: ${LIVEMAP_DIR:-./meshcore-mqtt-live-map}/backend
    env_file: .env.livemap
    volumes:
      - livemap-data:/data

  # ── Observer Matrix (observer status dashboard) ─────────────────────────
  observer-matrix:
    <<: *common
    build:
      context: ./observer-matrix
    env_file: .env.observer-matrix

  # ── Caddy (TLS reverse proxy) ────────────────────────────────────────────
  caddy:
    <<: *common
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data/caddy
      - ./landing:/srv/landing:ro
      - ./dev-landing:/srv/dev-landing:ro
      - ./keygen:/srv/keygen:ro

networks:
  slcoffline:
    name: slcoffline-net

volumes:
  corescope-data:
  mosquitto-data:
  broker-data:
  caddy-data:
  healthcheck-data:
  livemap-data:
  observer-matrix-data:
